<!doctype html>
<!-- Shop31: точка входу HTML для Vite; підключає src/main.tsx та шрифти. Див. docs/СТРУКТУРА-ПРОЄКТУ.md -->
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <!-- GitHub Pages project site: deep links (/repo/admin/...) resolve ./assets from wrong folder without <base>. -->
    <script>
      (function () {
        if (typeof window === 'undefined' || !window.location.hostname.endsWith('github.io')) return
        var parts = window.location.pathname.split('/').filter(Boolean)
        if (!parts.length) return
        var b = document.createElement('base')
        b.href = window.location.origin + '/' + parts[0] + '/'
        var m = document.querySelector('meta[charset]')
        if (m && m.parentNode) m.parentNode.insertBefore(b, m.nextSibling)
        else document.head.prepend(b)
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>Shop31 — неоновий магазин</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
