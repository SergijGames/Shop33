# Збірка Shop31 і публікація на GitHub Pages (безкоштовний хостинг статики).
# Увімкнення: Settings → Pages → Source: GitHub Actions.
# URL: https://<ваш-нік>.github.io/<назва-репозиторію>/
#
# Якщо job «deploy» падає за ~2 с без кроків:
# 1) Settings → Pages → Build and deployment → Source = «GitHub Actions» (не гілка gh-pages).
# 2) Settings → Environments → github-pages → Deployment branches: дозволити main (або «All branches»).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # upload-pages-artifact → actions/upload-artifact потребує write; deploy-pages читає той самий run.
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Typecheck and build (base = /repo/ for GitHub Pages)
        env:
          # Backend API base (Render/Railway). Add it in GitHub → Settings → Secrets and variables → Actions.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Payments (optional, only if you enable Stripe/LiqPay in prod)
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_LIQPAY_ENABLED: ${{ secrets.VITE_LIQPAY_ENABLED }}
        run: npx tsc -b && npx vite build --base=/${{ github.event.repository.name }}/
      # v3 більше не приймається на GitHub.com (потрібен артефакт через upload-artifact v4+).
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
